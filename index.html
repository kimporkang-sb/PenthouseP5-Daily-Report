<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>SB Daily Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --olive: #414535;
    --red: #DB0825;
    --bg: #F4F2EE;
    --card: #FFFFFF;
    --border: #E0DDD7;
    --text: #1A1A1A;
    --muted: #6B6B6B;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0); }
  .app { max-width: 680px; margin: 0 auto; padding: 24px 16px 48px; }
  .header { margin-bottom: 28px; }
  .header-logo { font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: .12em; color: var(--red); text-transform: uppercase; margin-bottom: 4px; }
  .header h1 { font-size: 22px; font-weight: 700; color: var(--olive); line-height: 1.2; }
  .header p { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .block-label { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--olive); }
  .block-label.sub { color: var(--muted); }
  .remove-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; line-height: 1; padding: 2px 6px; border-radius: 6px; transition: background .15s, color .15s; }
  .remove-btn:hover { background: #f0eeea; color: var(--red); }
  textarea { width: 100%; font-family: var(--mono); font-size: 12.5px; line-height: 1.6; color: var(--text); background: #FAFAF8; border: 1px solid var(--border); border-radius: 8px; padding: 12px; resize: vertical; min-height: 140px; outline: none; transition: border-color .15s; }
  textarea:focus { border-color: var(--olive); }
  textarea[readonly] { background: #F8F6F2; cursor: text; min-height: 200px; }
  .add-btn { width: 100%; background: none; border: 1.5px dashed var(--border); border-radius: 10px; padding: 12px; font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; transition: border-color .15s, color .15s, background .15s; margin-bottom: 12px; }
  .add-btn:hover { border-color: var(--olive); color: var(--olive); background: #f5f4f0; }
  .generate-btn { width: 100%; background: var(--red); color: #fff; border: none; border-radius: 10px; padding: 14px; font-family: var(--sans); font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: .02em; transition: background .15s, transform .1s; margin-bottom: 20px; }
  .generate-btn:hover { background: #b8051e; }
  .generate-btn:active { transform: scale(.98); }
  .output-section { display: none; }
  .output-section.visible { display: block; }
  .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .output-label { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--red); }
  .copy-btn { background: var(--olive); color: #fff; border: none; border-radius: 8px; padding: 6px 16px; font-family: var(--sans); font-size: 12px; font-weight: 600; cursor: pointer; transition: background .15s; }
  .copy-btn:hover { background: #2e3026; }
  .copy-btn.copied { background: #2e7d32; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-logo">Singbuild Construction</div>
    <h1>Daily Report Formatter</h1>
    <p>Paste raw site report → get Telegram-ready output</p>
  </div>
  <div id="blocks-container">
    <div class="card" id="block-1">
      <div class="card-header">
        <span class="block-label">Block 1 — Main Report</span>
      </div>
      <textarea id="block-1-text" placeholder="Paste Block 1 here (date, project name, manpower, tasks)…"></textarea>
    </div>
  </div>
  <button class="add-btn" onclick="addBlock()">+ Add Subcontractor Block</button>
  <button class="generate-btn" onclick="generate()">Generate Report</button>
  <div class="output-section" id="output-section">
    <div class="output-header">
      <span class="output-label">Formatted Output</span>
      <button class="copy-btn" id="copy-btn" onclick="copyOutput()">Copy</button>
    </div>
    <textarea id="output-text" readonly></textarea>
  </div>
</div>
<script>
// ─── Grammar correction ────────────────────────────────────────────────────────
// Converts bare infinitives / imperative forms to gerund (-ing) for activity lines
const GRAMMAR_MAP = [
  [/\bInstall\b(?!ing|ation|ed)/g, 'Installing'],
  [/\binstall\b(?!ing|ation|ed)/g, 'Installing'],
  [/\bRoute\b(?!d|ing)/g, 'Routing'],
  [/\broute\b(?!d|ing)/g, 'Routing'],
  [/\bApply\b(?!ing|ied)/g, 'Applying'],
  [/\bapply\b(?!ing|ied)/g, 'Applying'],
  [/\bScrape\b(?!d|ing)/g, 'Scraping'],
  [/\bscrape\b(?!d|ing)/g, 'Scraping'],
  [/\bCheck\b(?!ing|ed)/g, 'Checking'],
  [/\bcheck\b(?!ing|ed)/g, 'Checking'],
  [/\bFix\b(?!ing|ed)/g, 'Fixing'],
  [/\bfix\b(?!ing|ed)/g, 'Fixing'],
  [/\bRepair\b(?!ing|ed)/g, 'Repairing'],
  [/\brepair\b(?!ing|ed)/g, 'Repairing'],
  [/\bLay\b(?!ing|er)/g, 'Laying'],
  [/\blay\b(?!ing|er)/g, 'Laying'],
  [/\bOrganize\b(?!d|ing)/g, 'Organising'],
  [/\borganize\b(?!d|ing)/g, 'Organising'],
  [/\bClean\b(?!ing|ed)/g, 'Cleaning'],
  [/\bclean\b(?!ing|ed)/g, 'Cleaning'],
  [/\bPaint\b(?!ing|ed|er)/g, 'Painting'],
  [/\bpaint\b(?!ing|ed|er)/g, 'Painting'],
  [/\bSeal\b(?!ing|ed|ant)/g, 'Sealing'],
  [/\bseal\b(?!ing|ed|ant)/g, 'Sealing'],
  [/\bConnect\b(?!ing|ed|ion)/g, 'Connecting'],
  [/\bconnect\b(?!ing|ed|ion)/g, 'Connecting'],
  [/\bTest\b(?!ing|ed)/g, 'Testing'],
  [/\btest\b(?!ing|ed)/g, 'Testing'],
  [/\bPrepare\b(?!d|ing)/g, 'Preparing'],
  [/\bprepare\b(?!d|ing)/g, 'Preparing'],
  [/\bMove\b(?!d|ing)/g, 'Moving'],
  [/\bmove\b(?!d|ing)/g, 'Moving'],
  [/\bWeld\b(?!ing|ed)/g, 'Welding'],
  [/\bweld\b(?!ing|ed)/g, 'Welding'],
  [/\bCut\b(?!ting)/g, 'Cutting'],
  [/\bcut\b(?!ting)/g, 'Cutting'],
  [/\bDrill\b(?!ing|ed)/g, 'Drilling'],
  [/\bdrill\b(?!ing|ed)/g, 'Drilling'],
  [/\bFill\b(?!ing|ed)/g, 'Filling'],
  [/\bfill\b(?!ing|ed)/g, 'Filling'],
  [/\bAssemble\b(?!d|ing)/g, 'Assembling'],
  [/\bassemble\b(?!d|ing)/g, 'Assembling'],
  [/\bDeliver\b(?!ed|ing|y)/g, 'Delivering'],
  [/\bdeliver\b(?!ed|ing|y)/g, 'Delivering'],
  [/\bGrout\b(?!ing|ed)/g, 'Grouting'],
  [/\bgrout\b(?!ing|ed)/g, 'Grouting'],
  [/\bAlign\b(?!ing|ed|ment)/g, 'Aligning'],
  [/\balign\b(?!ing|ed|ment)/g, 'Aligning'],
  [/\bAdjust\b(?!ing|ed|ment)/g, 'Adjusting'],
  [/\badjust\b(?!ing|ed|ment)/g, 'Adjusting'],
  [/\bReplace\b(?!d|ing|ment)/g, 'Replacing'],
  [/\breplace\b(?!d|ing|ment)/g, 'Replacing'],
  [/\bRemove\b(?!d|ing|al)/g, 'Removing'],
  [/\bremove\b(?!d|ing|al)/g, 'Removing'],
  [/\bPlaster\b(?!ing|ed)/g, 'Plastering'],
  [/\bplaster\b(?!ing|ed)/g, 'Plastering'],
  [/\bRender\b(?!ing|ed)/g, 'Rendering'],
  [/\brender\b(?!ing|ed)/g, 'Rendering'],
  [/\bSkim\b(?!ming|med)/g, 'Skimming'],
  [/\bskim\b(?!ming|med)/g, 'Skimming'],
  [/\bFrame\b(?!d|ing|work)/g, 'Framing'],
  [/\bframe\b(?!d|ing|work)/g, 'Framing'],
  [/\bHang\b(?!ing)/g, 'Hanging'],
  [/\bhang\b(?!ing)/g, 'Hanging'],
  [/\bScreed\b(?!ing|ed)/g, 'Screeding'],
  [/\bscreed\b(?!ing|ed)/g, 'Screeding'],
  [/\bWaterproof\b(?!ing|ed)/g, 'Waterproofing'],
  [/\bwaterproof\b(?!ing|ed)/g, 'Waterproofing'],
  [/\bInspect\b(?!ing|ed|ion)/g, 'Inspecting'],
  [/\binspect\b(?!ing|ed|ion)/g, 'Inspecting'],
  [/\bMonitor\b(?!ing|ed)/g, 'Monitoring'],
  [/\bmonitor\b(?!ing|ed)/g, 'Monitoring'],
  [/\bPour\b(?!ing|ed)/g, 'Pouring'],
  [/\bpour\b(?!ing|ed)/g, 'Pouring'],
];

function applyGrammarCorrection(text) {
  if (!text) return text;
  let t = text.trim();
  for (const [pattern, replacement] of GRAMMAR_MAP) {
    t = t.replace(pattern, replacement);
  }
  // Capitalise first character
  return t.charAt(0).toUpperCase() + t.slice(1);
}

// ─── Block management ─────────────────────────────────────────────────────────
let blockCount = 1;
function addBlock() {
  blockCount++;
  const id = 'block-' + blockCount;
  const container = document.getElementById('blocks-container');
  const div = document.createElement('div');
  div.className = 'card';
  div.id = id;
  div.innerHTML =
    '<div class="card-header">' +
      '<span class="block-label sub">Block ' + blockCount + ' — Subcontractor</span>' +
      '<button class="remove-btn" onclick="removeBlock(\'' + id + '\')" title="Remove">×</button>' +
    '</div>' +
    '<textarea id="' + id + '-text" placeholder="Paste Block ' + blockCount + ' (subcontractor activities only — manpower ignored)…"></textarea>';
  container.appendChild(div);
}
function removeBlock(id) { const el = document.getElementById(id); if (el) el.remove(); }

// ─── Date formatting ──────────────────────────────────────────────────────────
function formatDate(raw) {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const m = raw.match(/(\d{4})[\.\-\/](\d{1,2})[\.\-\/](\d{1,2})/);
  if (!m) return null;
  return String(parseInt(m[3])).padStart(2,'0') + ' ' + months[parseInt(m[2])-1] + ' ' + m[1];
}

// ─── Manpower parsing (Block 1 only) ─────────────────────────────────────────
function parseManpower(lines) {
  let supervisor=0, male=0, female=0, electrical=0;
  const num = s => { const m = s.match(/(\d+)/); return m ? parseInt(m[1]) : 0; };
  for (const line of lines) {
    const l = line.trim();
    if (/^(translation|interpreter|supervisor|site supervisor)\s*:/i.test(l)) supervisor += num(l);
    else if (/^male workers?\s*:/i.test(l)) male += num(l);
    else if (/^female workers?\s*:/i.test(l)) female += num(l);
    else if (/^(electrician|electrical workers?)\s*:/i.test(l)) electrical += num(l);
    else if (/^(#air conditioning outsourcing|air con outsourcing|outsourcing|a\/c outsourcing)\s*:/i.test(l)) electrical += num(l);
  }
  return { supervisor, male, female, electrical };
}

// ─── Project name (Block 1 only) ─────────────────────────────────────────────
function extractProjectName(lines) {
  const skip = /^(translation|interpreter|supervisor|site supervisor|male workers?|female workers?|electrician|electrical workers?|#air conditioning outsourcing|air con outsourcing|outsourcing|a\/c outsourcing|tasks?|total)\s*:/i;
  for (const line of lines) {
    const l = line.trim();
    if (!l) continue;
    if (/^\d{4}[\.\-\/]/.test(l)) continue;
    if (skip.test(l)) continue;
    // Normalize PENTHOUSES → PENTHOUSE
    return l.replace(/UVP2\s*PENTHOUSES\b/gi, 'UVP2 PENTHOUSE')
            .replace(/\bPENTHOUSES\b/g, 'PENTHOUSE')
            .trim();
  }
  return 'Unknown Project';
}

// ─── Skip patterns ────────────────────────────────────────────────────────────
const SKIP = [
  /^name of project/i, /^overall progress/i, /^achieve progress/i,
  /^total manpower/i, /^site supervisor/i, /^team leader/i,
  /^technician/i, /^take leave/i, /^\*?activity$/i, /^\*$/,
  /^total\s*:/i, /^tasks?\s*:/i,
  /^(translation|interpreter|supervisor|male workers?|female workers?|electrician|electrical workers?|#air conditioning outsourcing|air con outsourcing|outsourcing|a\/c outsourcing)\s*:/i,
];

// ─── Normalize map ────────────────────────────────────────────────────────────
const NORM = [
  [/\b(clean\s*up|cleanup|perform\s*clean\s*up|housekeeping|protective\s*measures?|protection\s*measures?|perform\s*cleanup\s*and\s*protective\s*measures?)\b/gi, 'Site cleaning'],
  [/\b(organiz[ei](?:ng|e|ed)?\s*incoming\s*materials?|organis[ei](?:ng|e|ed)?\s*incoming\s*materials?|sort\s*materials?)\b/gi, 'Organising incoming materials'],
];

function stripNoise(text) {
  text = text.replace(/\bat\s+(LF|UF|GF|Level\s*\d+|L\d+|Upper\s*Floor|Lower\s*Floor)\b/gi, '');
  text = text.replace(/[\(\-]\s*\d+\s*(ppl|persons?|pax)\s*\)?/gi, '');
  text = text.replace(/^(\d+\.|[-•*]|\bto\b\s+|activity\s*:?|\*activity\s*:?)/i, '');
  return text.trim();
}

// ─── Activity extraction ──────────────────────────────────────────────────────
function extractActivities(rawText, isBlock1) {
  const activities = [];
  const lines = rawText.split('\n');
  for (let line of lines) {
    let l = line.trim();
    if (!l) continue;
    if (isBlock1 && /^tasks?\s*:/i.test(l)) {
      const parts = l.replace(/^tasks?\s*:\s*/i, '').split(/,|;|\band\b/i);
      for (let p of parts) {
        p = stripNoise(p.trim().replace(/\.$/, '').trim());
        if (!p) continue;
        for (const [pattern, replacement] of NORM) p = p.replace(pattern, replacement);
        if (p) activities.push(p);
      }
      continue;
    }
    if (!isBlock1) {
      if (SKIP.some(rx => rx.test(l))) continue;
      if (!/^(\d+\.|[-•*]|\bTo\b)/i.test(l)) continue;
      l = stripNoise(l);
      if (!l) continue;
      for (const [pattern, replacement] of NORM) l = l.replace(pattern, replacement);
      if (l) activities.push(l);
    }
  }
  return activities;
}

// ─── Categorize ───────────────────────────────────────────────────────────────
const ID_KW  = /floor tile|lay.*tile|tile|apply.*material|lay.*material|plaster|paint|skirting|ceiling|partition|gypsum|carpentry|door|window|wallpaper|vinyl|timber|wood|parquet|screed|skim|render|wall finish|joint compound|scrape|grout/i;
const MEP_KW = /pipe|drain|water|electrical|cable|conduit|wire|socket|switch|light|fixture|panel|db board|cdu|fcu|ahu|duct|hvac|air.*con|ventilat|sprinkler|fire|plumb|sanitary|toilet|pump|valve|riser|trunk|route.*pipe|route.*wir|pvc conduit/i;
const GEN_KW = /site clean|clean|protective|protection|hoarding|barricad|debris|rubbish|waste|housekeep|organiz|organis|incoming material|store|deliver|material.*move|move.*material/i;
function categorize(a) {
  if (GEN_KW.test(a)) return 'general';
  if (MEP_KW.test(a)) return 'mep';
  return 'id';
}

// ─── Generate ─────────────────────────────────────────────────────────────────
function generate() {
  const block1Text = document.getElementById('block-1-text').value.trim();
  if (!block1Text) { alert('Please paste Block 1 content.'); return; }

  const block1Lines = block1Text.split('\n');
  let dateStr = '';
  for (const line of block1Lines) { const d = formatDate(line.trim()); if (d) { dateStr = d; break; } }
  const projectName = extractProjectName(block1Lines);
  const mp = parseManpower(block1Lines);
  const total = mp.supervisor + mp.male + mp.female + mp.electrical;

  const allActivities = extractActivities(block1Text, true);
  document.querySelectorAll('#blocks-container .card:not(#block-1) textarea').forEach(ta => {
    if (ta.value.trim()) allActivities.push(...extractActivities(ta.value.trim(), false));
  });

  // Deduplicate
  const seen = new Set(), unique = [];
  for (const a of allActivities) { const k = a.toLowerCase().trim(); if (!seen.has(k)) { seen.add(k); unique.push(a); } }

  // Categorize + grammar correct
  const idW = [], mepW = [], genW = [];
  for (const a of unique) {
    const corrected = applyGrammarCorrection(a);
    const cat = categorize(a);
    if (cat === 'id') idW.push(corrected);
    else if (cat === 'mep') mepW.push(corrected);
    else genW.push(corrected);
  }

  // Auto-inject "Site cleaning" into General Works if absent
  if (!genW.some(a => /site clean/i.test(a))) genW.push('Site cleaning');

  // Build output
  const lines = [
    'DAILY SITE ACTIVITIES REPORT',
    'Date: ' + (dateStr || '—'),
    'Project: ' + projectName,
    '',
    'Manpower Summary',
  ];
  if (mp.supervisor > 0) lines.push('- Supervisor: ' + mp.supervisor + (mp.supervisor === 1 ? ' person' : ' persons'));
  if (mp.male > 0)       lines.push('- Male Worker: ' + mp.male + (mp.male === 1 ? ' person' : ' persons'));
  if (mp.female > 0)     lines.push('- Female Worker: ' + mp.female + (mp.female === 1 ? ' person' : ' persons'));
  if (mp.electrical > 0) lines.push('- Electrical Workers: ' + mp.electrical + (mp.electrical === 1 ? ' person' : ' persons'));
  lines.push('Total Manpower: ' + total + (total === 1 ? ' person' : ' persons'));
  if (idW.length)  { lines.push('', 'ID Works');  idW.forEach(a => lines.push('- ' + a)); }
  if (mepW.length) { lines.push('', 'MEP Works'); mepW.forEach(a => lines.push('- ' + a)); }
  if (genW.length) { lines.push('', 'General Works'); genW.forEach(a => lines.push('- ' + a)); }

  document.getElementById('output-text').value = lines.join('\n');
  const section = document.getElementById('output-section');
  section.classList.add('visible');
  const btn = document.getElementById('copy-btn');
  btn.textContent = 'Copy'; btn.classList.remove('copied');
  setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
}

function copyOutput() {
  const ta = document.getElementById('output-text');
  ta.focus(); ta.setSelectionRange(0, 99999);
  try { document.execCommand('copy'); } catch(e) { navigator.clipboard && navigator.clipboard.writeText(ta.value); }
  const btn = document.getElementById('copy-btn');
  btn.textContent = 'Copied!'; btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
}
</script>
</body>
</html>
